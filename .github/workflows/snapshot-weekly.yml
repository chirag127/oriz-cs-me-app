name: Weekly snapshot to repo

# Runs once a week, pulls every authoritative `media/<key>` doc from
# Firestore, and commits the JSON files to the repo. This becomes the
# build-time data source for the Astro SSG site (which reads
# `src/content/generated/<key>.json` at build time).
#
# No third-party APIs are touched here — only Firestore is read. If the
# 6-hourly sync workflow has been rejecting fetches, the snapshot will
# carry forward the last good data and log a stale-data warning.

on:
  schedule:
    - cron: '23 4 * * 1'    # Monday ~04:23 UTC
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write       # to push the snapshot commit
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Use the PAT so the resulting push triggers the daily-build workflow
          # (the default GITHUB_TOKEN's pushes do not trigger other workflows).
          token: ${{ secrets.GH_PAT }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Snapshot Firestore → repo
        run: pnpm exec tsx scripts/snapshot-weekly.ts
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}

      - name: Commit and push snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/generated/ public/data/
          if git diff --staged --quiet; then
            echo "No changes to snapshot."
          else
            git commit -m "chore: weekly data snapshot from Firestore [skip ci]"
            git push
          fi
